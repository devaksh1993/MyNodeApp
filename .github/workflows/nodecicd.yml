name: Node CI with Playwright

on:
  push:
    branches: ["main"]

jobs:
  Build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write


    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Build Docker image
        run: docker build -t ghcr.io/${{ github.repository_owner }}/my-node-app:latest .

      - name: Run Docker container
        run: |
          docker run -d --name app -p 3000:3000 ghcr.io/${{ github.repository_owner }}/my-node-app:latest
          sleep 5

      - name: Run Playwright tests
        run: npx playwright test

      - name: Stop and remove container
        run: |
          docker stop app
          docker rm app

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Push Docker image
        run: docker push ghcr.io/${{ github.repository_owner }}/my-node-app:latest