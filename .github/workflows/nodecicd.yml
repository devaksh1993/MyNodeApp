name: Simple Node CI

on:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Run app
        run: |
          node app.js &
          sleep 3
          curl http://localhost:3000/health
          pkill -f "node app.js"
          echo "Server test passed successfully"